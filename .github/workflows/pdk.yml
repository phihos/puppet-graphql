name: Run PDK tests

on:
  - push
  - pull_request

jobs:
  tests:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          curl -JLO 'https://pm.puppet.com/cgi-bin/pdk_download.cgi?dist=ubuntu&rel=22.04&arch=amd64&ver=3.0.1.3'
          sudo dpkg -i pdk_3.0.1.3-1jammy_amd64.deb

      - name: Install PDK Ruby Dependencies
        run: pdk bundle install

      - name: Validate
        run: pdk validate

      - name: Start Netbox for Testing
        run: |
          cd spec/functions/netbox
          docker compose up -d
          while ! curl -s http://127.0.0.1:8000/api/ &> /dev/null ; do
            echo "Waiting for Netbox API..."
            sleep 1 
          done
          echo "Netbox API ready!"


      - name: Run Unit Tests
        run: pdk test unit
